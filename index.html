<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeRush - Typing Speed Test</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <h1>⌨️ TypeRush</h1>
        <p class="subtitle">Test your typing speed and accuracy</p>

        <div class="controls">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>

            <button id="newTestBtn">New Test</button>
        </div>

        <div class="stats">
            <div class="card">
                <h3>Time</h3>
                <span id="time">0s</span>
            </div>

            <div class="card">
                <h3>WPM</h3>
                <span id="wpm">0</span>
            </div>

            <div class="card">
                <h3>Accuracy</h3>
                <span id="accuracy">100%</span>
            </div>

            <div class="card">
                <h3>Best Score</h3>
                <span id="bestScore">0</span>
            </div>
        </div>

        <div class="text-container" id="textDisplay"></div>

        <textarea
            id="textInput"
            placeholder="Start typing here..."
            autocomplete="off"
        ></textarea>

        <div class="result hidden" id="resultPanel">
            <h2>Test Completed 🎉</h2>
            <p><strong>Time:</strong> <span id="finalTime"></span></p>
            <p><strong>WPM:</strong> <span id="finalWpm"></span></p>
            <p><strong>Accuracy:</strong> <span id="finalAccuracy"></span></p>
            <p id="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
